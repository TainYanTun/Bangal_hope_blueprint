<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bangla Hope – Secure Auth Gateway</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #1e3a4a;
      --accent-teal: #2B7A9E; 
      --accent-pink: #d17a8e;
      --bg-app: #f8fafc;
      --surface: #ffffff;
      --surface-subtle: #f1f5f9;
      --border: #e2e8f0;
      --border-soft: #f1f5f9;
      --border-strong: #cbd5e1;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --radius: 8px;
      --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      --ink: #0f172a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Nunito', sans-serif; 
      background-color: #f8fafc;
      background-image: 
        radial-gradient(at 0% 0%, rgba(30, 58, 74, 0.04) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(43, 122, 158, 0.06) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(209, 122, 142, 0.04) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(43, 122, 158, 0.06) 0px, transparent 50%);
      color: var(--text-main); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
    }

    /* SYSTEM MARKER - Styled like a Topbar Item */
    .system-marker { 
      position: fixed; 
      top: 20px; 
      right: 20px; 
      background: var(--surface); 
      border: 1px solid var(--border); 
      padding: 10px 16px; 
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .system-marker strong { color: var(--accent-teal); }

    /* LOGIN CONTAINER - Wireframe 400px */
    .login-container { width: 400px; position: relative; }
    
    .annotate-label { 
      font-size: 10px; 
      font-weight: 800; 
      color: var(--accent-teal); 
      text-transform: uppercase; 
      letter-spacing: 0.1em; 
      margin-bottom: 12px; 
      display: block; 
    }

    /* MAIN CARD - Dashboard Card Style */
    .card { 
      background: var(--surface); 
      border: 1.5px solid var(--border-soft); 
      border-radius: var(--radius); 
      box-shadow: var(--shadow-lg); 
      overflow: hidden;
    }

    /* LOGO HEADER - Card Header Style */
    .card-header-logo { 
      padding: 32px; 
      text-align: center; 
      border-bottom: 1px solid var(--border-soft); 
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-subtle) 100%); 
    }
    .logo-img-box { width: 48px; height: 48px; background: #fff; border-radius: 8px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; padding: 6px; box-shadow: var(--shadow); border: 1px solid var(--border-soft); }
    .logo-img-box img { width: 100%; height: 100%; object-fit: contain; }
    .logo-text h1 { font-family: 'Lora', serif; font-size: 18px; font-weight: 600; color: var(--primary); line-height: 1.2; }
    .logo-text span { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

    /* FORM CONTENT */
    .card-content { padding: 32px; }
    
    .field-group { margin-bottom: 24px; }
    .field-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: block; }
    
    .input-field { 
      width: 100%; 
      height: 44px; 
      padding: 10px 14px; 
      background: var(--surface-subtle); 
      border: 1px solid var(--border); 
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      color: var(--text-main);
      transition: all 0.2s;
    }
    .input-field:focus { outline: none; border-color: var(--accent-teal); background: var(--surface); box-shadow: 0 0 0 3px rgba(43, 122, 158, 0.1); }

    /* MFA SECTION - Dashed Wireframe but Polished */
    .mfa-block { 
      border: 1.5px dashed var(--border-strong); 
      background: #fcfdfe; 
      padding: 20px; 
      border-radius: var(--radius-sm);
      margin-bottom: 24px;
      position: relative;
    }
    .mfa-tag { position: absolute; top: -10px; left: 16px; background: #fcfdfe; padding: 0 8px; font-size: 9px; font-weight: 800; color: var(--accent-pink); text-transform: uppercase; letter-spacing: 0.05em; }

    /* BUTTON - Dashboard Nav Active Style */
    .btn-auth { 
      width: 100%; 
      padding: 14px; 
      background: #1e293b; 
      color: white; 
      border: none; 
      border-radius: var(--radius-sm);
      font-weight: 700; 
      font-size: 13px; 
      text-transform: uppercase; 
      letter-spacing: 0.05em;
      cursor: pointer; 
      transition: all 0.2s;
    }
    .btn-auth:hover { background: #0a1f35; transform: translateY(-1px); box-shadow: var(--shadow); }

    /* FOOTER */
    .card-footer { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 24px; line-height: 1.6; }
    .card-footer strong { color: var(--text-main); }

    .bottom-links { margin-top: 20px; text-align: center; font-size: 12px; }
    .link-item { color: var(--accent-teal); font-weight: 700; text-decoration: none; cursor: pointer; }
    .link-item:hover { text-decoration: underline; }
    .divider { color: var(--border-strong); margin: 0 8px; }

  </style>
</head>
